services:
  anime-sheduler:
    build: .
    image: anime-sheduler:local
    container_name: anime-sheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WEB_PORT: 3000
      DATA_FILE: /app/data/db.json
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - anime-sheduler-data:/app/data

volumes:
  anime-sheduler-data:
